<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wine Atlas — Cru.Vin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Jost:wght@200;300;400;500&family=DM+Mono:ital,wght@0,300;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/nav.css" />
  <link rel="stylesheet" href="css/atlas-full.css" />
</head>
<body class="theme-dark">

  <!-- NAV -->
  <header id="site-nav" class="nav nav--atlas scrolled" role="banner">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo">
        <span class="nav__logo-cru">Cru</span><span class="nav__logo-dot">.</span><span class="nav__logo-vin">Vin</span>
      </a>
      <nav class="nav__links">
        <a href="atlas.html" class="nav__link nav__link--active">Atlas</a>
        <a href="#" class="nav__link">Academy</a>
        <a href="#" class="nav__link">Editorial</a>
        <a href="tasting.html" class="nav__link">Tasting</a>
      </nav>
      <div class="nav__actions">
        <button class="nav__search-btn" id="search-trigger" aria-label="Buscar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
        <a href="#" class="nav__cta">Join Platform</a>
      </div>
    </div>
  </header>

  <div class="atlas-app" id="atlas-app">

    <!-- ═══════════════ SIDEBAR ═══════════════ -->
    <aside class="atlas-sidebar" id="atlas-sidebar">
      <div class="atlas-sidebar__header">
        <h1 class="atlas-sidebar__title">Wine Atlas</h1>
        <p class="atlas-sidebar__subtitle">340 regiões · 1,200 produtores</p>
      </div>

      <!-- Search -->
      <div class="atlas-search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="atlas-search-input" placeholder="Buscar região, casta, produtor…" />
      </div>

      <!-- Layer controls -->
      <div class="atlas-layers">
        <p class="atlas-layers__label">Camadas do mapa</p>
        <div class="atlas-layer-list">
          <label class="atlas-layer-item">
            <input type="checkbox" checked data-layer="regions" />
            <span class="atlas-layer-item__dot" style="background:#c9a84c"></span>
            <span>Regiões</span>
          </label>
          <label class="atlas-layer-item">
            <input type="checkbox" checked data-layer="climate" />
            <span class="atlas-layer-item__dot" style="background:#4a90c9"></span>
            <span>Clima</span>
          </label>
          <label class="atlas-layer-item">
            <input type="checkbox" data-layer="soil" />
            <span class="atlas-layer-item__dot" style="background:#8b6f47"></span>
            <span>Solo</span>
          </label>
          <label class="atlas-layer-item">
            <input type="checkbox" data-layer="elevation" />
            <span class="atlas-layer-item__dot" style="background:#5a9e6f"></span>
            <span>Altitude</span>
          </label>
          <label class="atlas-layer-item">
            <input type="checkbox" data-layer="grapes" />
            <span class="atlas-layer-item__dot" style="background:#9b5a8c"></span>
            <span>Castas</span>
          </label>
        </div>
      </div>

      <!-- Region list -->
      <div class="atlas-region-browser">
        <div class="atlas-region-browser__tabs">
          <button class="atlas-tab active" data-tab="all">Todas</button>
          <button class="atlas-tab" data-tab="france">França</button>
          <button class="atlas-tab" data-tab="italy">Itália</button>
          <button class="atlas-tab" data-tab="spain">Espanha</button>
          <button class="atlas-tab" data-tab="other">Outras</button>
        </div>
        <div class="atlas-region-list" id="atlas-region-list">
          <!-- Populated by JS -->
        </div>
      </div>
    </aside>

    <!-- ═══════════════ MAP ═══════════════ -->
    <main class="atlas-map-wrap" id="atlas-map-wrap">
      <canvas id="atlas-canvas" aria-label="Mapa interativo de regiões vinícolas"></canvas>

      <!-- Map controls -->
      <div class="atlas-controls">
        <button class="atlas-ctrl-btn" id="ctrl-zoom-in" aria-label="Zoom in" title="Ampliar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <button class="atlas-ctrl-btn" id="ctrl-zoom-out" aria-label="Zoom out" title="Reduzir">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <div class="atlas-ctrl-divider"></div>
        <button class="atlas-ctrl-btn" id="ctrl-reset" aria-label="Reset view" title="Redefinir visão">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        </button>
        <button class="atlas-ctrl-btn" id="ctrl-satellite" aria-label="Toggle satellite" title="Vista satélite">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        </button>
      </div>

      <!-- Scale bar -->
      <div class="atlas-scale">
        <div class="atlas-scale__bar"></div>
        <span class="atlas-scale__label" id="scale-label">500 km</span>
      </div>

      <!-- Coordinates -->
      <div class="atlas-coords" id="atlas-coords">
        <span id="coords-lat">48.85°N</span>
        <span>·</span>
        <span id="coords-lng">2.35°E</span>
      </div>

      <!-- Tooltip -->
      <div class="atlas-tooltip" id="atlas-tooltip">
        <div class="atlas-tooltip__region" id="tt-region">—</div>
        <div class="atlas-tooltip__country" id="tt-country">—</div>
      </div>
    </main>

    <!-- ═══════════════ REGION DETAIL PANEL ═══════════════ -->
    <aside class="atlas-detail" id="atlas-detail">
      <button class="atlas-detail__close" id="detail-close" aria-label="Fechar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>

      <div class="atlas-detail__hero" id="detail-hero">
        <div class="atlas-detail__hero-bg" id="detail-hero-bg"></div>
        <div class="atlas-detail__hero-content">
          <div class="atlas-detail__flag" id="detail-flag"></div>
          <h2 class="atlas-detail__name" id="detail-name">Borgonha</h2>
          <p class="atlas-detail__country" id="detail-country">França · Bourgogne-Franche-Comté</p>
        </div>
      </div>

      <div class="atlas-detail__body">
        <!-- Quick stats -->
        <div class="atlas-detail__stats" id="detail-stats">
          <!-- Populated by JS -->
        </div>

        <!-- Tabs -->
        <div class="atlas-detail__tabs">
          <button class="detail-tab active" data-dtab="overview">Visão Geral</button>
          <button class="detail-tab" data-dtab="terroir">Terroir</button>
          <button class="detail-tab" data-dtab="producers">Produtores</button>
          <button class="detail-tab" data-dtab="vintages">Safras</button>
        </div>

        <div class="atlas-detail__tab-content" id="detail-tab-content">
          <!-- Populated by JS -->
        </div>
      </div>
    </aside>

  </div><!-- /atlas-app -->

  <!-- Legend -->
  <div class="atlas-legend" id="atlas-legend">
    <p class="atlas-legend__title">Intensidade vinícola</p>
    <div class="atlas-legend__scale">
      <span>Baixa</span>
      <div class="atlas-legend__gradient"></div>
      <span>Alta</span>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/atlas-full.js"></script>
</body>
</html>
