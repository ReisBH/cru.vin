<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Cru.Vin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Jost:wght@200;300;400;500&family=DM+Mono:ital,wght@0,300;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body class="theme-dark admin-body">

  <div class="admin-shell" id="admin-shell">

    <!-- ══════════════ SIDEBAR ══════════════ -->
    <aside class="admin-nav" id="admin-nav">
      <div class="admin-nav__brand">
        <a href="index.html" class="admin-nav__logo">
          <span>Cru</span><span class="admin-nav__logo-dot">.</span><span>Vin</span>
        </a>
        <span class="admin-nav__badge">Admin</span>
      </div>

      <nav class="admin-nav__menu" role="navigation" aria-label="Admin navigation">
        <div class="admin-nav__group">
          <span class="admin-nav__group-label">Visão Geral</span>
          <a href="#" class="admin-nav__item active" data-module="dashboard">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            Dashboard
          </a>
          <a href="#" class="admin-nav__item" data-module="analytics">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            Analytics
          </a>
        </div>

        <div class="admin-nav__group">
          <span class="admin-nav__group-label">Conteúdo</span>
          <a href="#" class="admin-nav__item" data-module="cms">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            CMS Editorial
            <span class="admin-nav__item-badge" id="badge-cms">3</span>
          </a>
          <a href="#" class="admin-nav__item" data-module="wines">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 22h8M7 10h10l-1.5-7h-7L7 10zM7 10a5 5 0 0 0 10 0"/></svg>
            Base de Vinhos
          </a>
          <a href="#" class="admin-nav__item" data-module="regions">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            Regiões & Atlas
          </a>
          <a href="#" class="admin-nav__item" data-module="producers">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Produtores
          </a>
          <a href="#" class="admin-nav__item" data-module="media">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            Media Assets
          </a>
        </div>

        <div class="admin-nav__group">
          <span class="admin-nav__group-label">Educação</span>
          <a href="#" class="admin-nav__item" data-module="lms">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
            Academy / LMS
          </a>
          <a href="#" class="admin-nav__item" data-module="certifications">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>
            Certificações
          </a>
        </div>

        <div class="admin-nav__group">
          <span class="admin-nav__group-label">Plataforma</span>
          <a href="#" class="admin-nav__item" data-module="users">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            Usuários
            <span class="admin-nav__item-badge admin-nav__item-badge--red" id="badge-users">12</span>
          </a>
          <a href="#" class="admin-nav__item" data-module="community">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            Comunidade
          </a>
          <a href="#" class="admin-nav__item" data-module="ai">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            IA & Modelos
          </a>
          <a href="#" class="admin-nav__item" data-module="revenue">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            Receitas
          </a>
          <a href="#" class="admin-nav__item" data-module="settings">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            Configurações
          </a>
        </div>
      </nav>

      <!-- User profile -->
      <div class="admin-nav__user">
        <div class="admin-nav__user-avatar">ED</div>
        <div class="admin-nav__user-info">
          <span class="admin-nav__user-name">Editorial Director</span>
          <span class="admin-nav__user-role">Super Admin</span>
        </div>
        <button class="admin-nav__user-menu" aria-label="User menu">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
        </button>
      </div>
    </aside>

    <!-- ══════════════ CONTENT ══════════════ -->
    <div class="admin-content" id="admin-content">

      <!-- Top bar -->
      <header class="admin-topbar">
        <div class="admin-topbar__left">
          <button class="admin-topbar__sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <div class="admin-breadcrumb" id="admin-breadcrumb">
            <span>Admin</span>
            <span class="admin-breadcrumb__sep">›</span>
            <span id="breadcrumb-current">Dashboard</span>
          </div>
        </div>
        <div class="admin-topbar__right">
          <div class="admin-topbar__search">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="text" placeholder="Buscar no admin…" />
          </div>
          <button class="admin-topbar__notif" id="notif-btn" aria-label="Notifications">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span class="admin-topbar__notif-dot"></span>
          </button>
          <a href="index.html" class="admin-topbar__view-site">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            Ver site
          </a>
        </div>
      </header>

      <!-- Module content -->
      <main class="admin-module" id="admin-module">
        <!-- Populated by JS -->
      </main>

    </div><!-- /admin-content -->
  </div><!-- /admin-shell -->

  <!-- Toast container -->
  <div id="admin-toasts" class="admin-toasts"></div>

  <script src="js/utils.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
